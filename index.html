<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Hub — AI 서비스 모음</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 240px;
      --topbar-h: 60px;
      --subnav-h: 52px;
      --bg: #f1f5f9;
      --sidebar-bg: #0f172a;
      --sidebar-hover: #1e293b;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
      --shadow-hover: 0 8px 28px rgba(0,0,0,.14);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--sidebar-bg);
      position: fixed;
      left: 0; top: 0;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-brand {
      padding: 24px 20px 20px;
      border-bottom: 1px solid #1e293b;
    }

    .sidebar-brand h1 {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .sidebar-brand span {
      display: block;
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
      font-weight: 400;
    }

    .sidebar-nav {
      padding: 16px 10px;
      flex: 1;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 10px 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: background .18s, transform .1s;
      margin-bottom: 2px;
      color: #94a3b8;
      font-size: 14px;
      font-weight: 500;
    }

    .nav-item:hover { background: var(--sidebar-hover); color: #e2e8f0; }

    .nav-item.active {
      color: #fff;
      font-weight: 600;
    }

    .nav-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .nav-count {
      margin-left: auto;
      font-size: 11px;
      background: #1e293b;
      color: #64748b;
      padding: 2px 7px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .nav-item.active .nav-count {
      color: #fff;
    }

    .nav-arrow {
      margin-left: 4px;
      font-size: 11px;
      color: #475569;
      transition: transform .2s;
      flex-shrink: 0;
    }

    .nav-item.open .nav-arrow { transform: rotate(180deg); }

    .nav-dropdown {
      overflow: hidden;
      max-height: 0;
      transition: max-height .25s ease;
    }

    .nav-dropdown.open { max-height: 400px; }

    .nav-sub-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px 7px 56px;
      font-size: 13px;
      color: #64748b;
      cursor: pointer;
      border-radius: 8px;
      margin: 1px 0;
      transition: background .15s, color .15s;
    }

    .nav-sub-item:hover { background: #1e293b; color: #e2e8f0; }

    .nav-sub-item.active { color: #fff; font-weight: 600; }

    .nav-sub-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.6;
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid #1e293b;
      font-size: 11px;
      color: #334155;
    }

    /* ── MAIN ── */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    #topbar {
      height: var(--topbar-h);
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 90;
      gap: 12px;
    }

    #topbar-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #topbar-title .cat-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    /* ── SUBNAV ── */
    #subnav {
      height: var(--subnav-h);
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 4px;
      position: sticky;
      top: var(--topbar-h);
      z-index: 89;
    }

    .sub-tab {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }

    .sub-tab:hover { background: var(--bg); color: var(--text); }

    .sub-tab.active {
      color: #fff;
      font-weight: 600;
    }

    /* ── CONTENT ── */
    #content {
      padding: 28px;
      flex: 1;
    }

    .section-header {
      margin-bottom: 20px;
    }

    .section-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform .2s, box-shadow .2s;
      display: flex;
      flex-direction: column;
      gap: 14px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .card-avatar {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }

    .card-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .card-sub-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      margin-top: 3px;
      display: inline-block;
      opacity: 0.85;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-url {
      font-size: 11px;
      color: #94a3b8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 160px;
    }

    .card-btn {
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 7px;
      color: #fff;
      text-decoration: none;
      flex-shrink: 0;
      transition: opacity .15s;
    }

    .card-btn:hover { opacity: 0.85; }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
      font-size: 15px;
    }
  </style>

// ── STATE ──────────────────────────────────────────────────────────────────
let activeCatId  = CATEGORIES[0].id;
let activeSub    = "전체";

// ── HELPERS ───────────────────────────────────────────────────────────────
function getInitial(name) {
  const words = name.split(" ");
  if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
  return name.slice(0, 2).toUpperCase();
}

function lighten(hex, pct = 0.15) {
  const n = parseInt(hex.replace("#",""), 16);
  const r = Math.min(255, ((n>>16) & 0xff) + Math.round(pct*255));
  const g = Math.min(255, ((n>>8)  & 0xff) + Math.round(pct*255));
  const b = Math.min(255, ( n      & 0xff) + Math.round(pct*255));
  return `rgb(${r},${g},${b})`;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderSidebar() {
  const nav = document.querySelector(".sidebar-nav");
  nav.innerHTML = `<div class="nav-label">카테고리</div>`;
  CATEGORIES.forEach(cat => {
    const isActive = cat.id === activeCatId;
    const wrapper  = document.createElement("div");

    // 메인 아이템
    const item = document.createElement("div");
    item.className = "nav-item" + (isActive ? " active open" : "");
    item.innerHTML = `
      <div class="nav-icon" style="background:${isActive ? cat.color : '#1e293b'}">${cat.icon}</div>
      <span>${cat.label}</span>
      <span class="nav-count">${cat.services.length}</span>
      <span class="nav-arrow">▾</span>
    `;
    if (isActive) item.style.background = cat.color + "22";

    // 드롭다운
    const dropdown = document.createElement("div");
    dropdown.className = "nav-dropdown" + (isActive ? " open" : "");

    cat.subs.forEach(sub => {
      const subItem = document.createElement("div");
      subItem.className = "nav-sub-item" + (isActive && sub === activeSub ? " active" : "");
      if (isActive && sub === activeSub) subItem.style.background = cat.color + "33";
      subItem.innerHTML = `<span class="nav-sub-dot"></span>${sub}`;
      subItem.addEventListener("click", (e) => {
        e.stopPropagation();
        activeCatId = cat.id;
        activeSub   = sub;
        renderAll();
      });
      dropdown.appendChild(subItem);
    });

    // 메인 아이템 클릭: 카테고리 전환 + 드롭다운 토글
    item.addEventListener("click", () => {
      if (activeCatId === cat.id) {
        dropdown.classList.toggle("open");
        item.classList.toggle("open");
      } else {
        activeCatId = cat.id;
        activeSub   = "전체";
        renderAll();
      }
    });

    wrapper.appendChild(item);
    wrapper.appendChild(dropdown);
    nav.appendChild(wrapper);
  });
}

function renderTopbar() {
  const cat  = CATEGORIES.find(c => c.id === activeCatId);
  const tb   = document.getElementById("topbar-title");
  tb.innerHTML = `
    <div class="cat-icon" style="background:${cat.color}22">${cat.icon}</div>
    <span style="color:${cat.color}">${cat.label}</span>
    <span style="color:#94a3b8; font-weight:400; font-size:14px">— ${cat.services.length}개 서비스</span>
  `;
}

function renderSubnav() {
  const cat = CATEGORIES.find(c => c.id === activeCatId);
  const sn  = document.getElementById("subnav");
  sn.innerHTML = "";
  cat.subs.forEach(sub => {
    const tab = document.createElement("div");
    tab.className = "sub-tab" + (sub === activeSub ? " active" : "");
    tab.textContent = sub;
    if (sub === activeSub) tab.style.background = cat.color;
    tab.addEventListener("click", () => {
      activeSub = sub;
      renderSubnav();
      renderCards();
    });
    sn.appendChild(tab);
  });
}

function renderCards() {
  const cat   = CATEGORIES.find(c => c.id === activeCatId);
  const grid  = document.getElementById("cards-grid");
  const items = activeSub === "전체"
    ? cat.services
    : cat.services.filter(s => s.sub === activeSub);

  grid.innerHTML = "";

  if (!items.length) {
    grid.innerHTML = `<div class="empty">서비스가 없습니다.</div>`;
    return;
  }

  items.forEach(svc => {
    const card = document.createElement("a");
    card.className = "card";
    card.rel       = "noopener noreferrer";

    const isApp = svc.url.startsWith("discord://") || svc.url.startsWith("github-mac://");
    if (isApp) {
      card.href = "javascript:void(0)";
      card.addEventListener("click", () => { window.location.href = svc.url; });
    } else {
      card.href   = svc.url;
      card.target = "_blank";
    }

    const appNames = { "discord://": "discord 앱", "github-mac://": "GitHub Desktop 앱" };
    const domain = isApp
      ? (appNames[svc.url] || "로컬 앱")
      : svc.url.replace(/https?:\/\/(www\.)?/, "").replace(/\/.*/,"");

    card.innerHTML = `
      <div class="card-header">
        <div class="card-avatar" style="background:linear-gradient(135deg,${svc.color},${lighten(svc.color,0.2)})">${getInitial(svc.name)}</div>
        <div>
          <div class="card-name">${svc.name}</div>
          <span class="card-sub-tag" style="background:${cat.color}18;color:${cat.color}">${svc.sub}</span>
        </div>
      </div>
      <div class="card-desc">${svc.desc}</div>
      <div class="card-footer">
        <span class="card-url">${domain}</span>
        <span class="card-btn" style="background:${svc.color}">방문하기 →</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

function renderAll() {
  renderSidebar();
  renderTopbar();
  renderSubnav();
  renderCards();
}

renderAll();
